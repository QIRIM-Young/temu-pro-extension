<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <title>Temu Pro — Панель</title>
    <style>
        :root {
            color-scheme: light dark;
            --sp-bg: #fff;
            --sp-text: #222;
            --sp-header-bg: #f8f9fa;
            --sp-border: #ddd;
            --sp-card-bg: #f5f5f5;
            --sp-subtle: #888;
            --sp-accent: #ff6b00;
            --sp-input-bg: #fff;
            --sp-input-border: #ccc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --sp-bg: #0f0f1a;
                --sp-text: #e0e0e0;
                --sp-header-bg: #1a1a2e;
                --sp-border: rgba(255, 255, 255, 0.08);
                --sp-card-bg: rgba(255, 255, 255, 0.04);
                --sp-subtle: #666;
                --sp-input-bg: #222;
                --sp-input-border: #444;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--sp-bg);
            color: var(--sp-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Заголовок */
        .header {
            background: var(--sp-header-bg);
            padding: 16px 20px;
            border-bottom: 1px solid var(--sp-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
        }

        .header .version {
            font-size: 10px;
            color: var(--sp-subtle);
            background: var(--sp-card-bg);
            border-radius: 8px;
            padding: 2px 7px;
        }

        /* Статистика */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 12px 16px;
        }

        .stat-card {
            background: var(--sp-card-bg);
            border: 1px solid var(--sp-border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 800;
            color: var(--sp-accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--sp-subtle);
            margin-top: 2px;
            text-transform: uppercase;
        }

        /* Секція */
        .section {
            padding: 12px 16px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--sp-subtle);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Плейсхолдер */
        .placeholder {
            text-align: center;
            padding: 30px 20px;
            color: var(--sp-subtle);
            font-size: 12px;
        }

        .placeholder-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        /* Курс */
        .exchange-rate {
            text-align: center;
            font-size: 11px;
            color: var(--sp-subtle);
            padding: 8px;
            border-top: 1px solid var(--sp-border);
        }

        .exchange-rate span {
            color: var(--sp-accent);
            font-weight: 700;
        }

        .divider {
            height: 1px;
            background: var(--sp-border);
            margin: 4px 16px;
        }

        .info {
            font-size: 11px;
            color: var(--sp-subtle);
            padding: 12px 16px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-left">
            <h1>🛒 Temu Pro</h1>
            <span class="version">v14.0</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-num" id="stat-processed">—</div>
            <div class="stat-label">Оброблено</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-avg-score">—</div>
            <div class="stat-label">Сер. бал</div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="section">
        <div class="section-title">📊 Аналітика</div>
        <div id="product-info">
            <div class="placeholder">
                <span class="placeholder-icon">🔍</span>
                Наведіть курсор на товар,<br>щоб побачити його оцінку
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="info">
        💡 <b>Налаштування</b> доступні через плаваючу панель на сторінці Temu (вкладка ⚙️ Налаштування).
    </div>

    <div class="exchange-rate">
        Курс: <span id="exchange-rate">завантаження...</span>
    </div>

    <script>
        // Отримувати оновлення від content script
        chrome.runtime.onMessage.addListener((msg) => {
            if (msg.action === 'statsUpdate') {
                document.getElementById('stat-processed').textContent = msg.processed || 0;
                document.getElementById('stat-avg-score').textContent = msg.avgScore || '—';
            }
            if (msg.action === 'productHover' && msg.html) {
                document.getElementById('product-info').innerHTML = msg.html;
            }
        });

        // Показати курс
        chrome.storage.local.get({ exchangeRate: 41.0 }, (s) => {
            document.getElementById('exchange-rate').textContent = `1$ ≈ ${Math.round(s.exchangeRate)}₴`;
        });
    </script>
</body>

</html>
