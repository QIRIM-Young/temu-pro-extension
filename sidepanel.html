<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <title>Temu Pro — Панель</title>
    <style>
        :root {
            color-scheme: light dark;
            --sp-bg: #fff;
            --sp-text: #222;
            --sp-header: #f8f9fa;
            --sp-border: #ddd;
            --sp-card: #f5f5f5;
            --sp-sub: #888;
            --sp-accent: #ff6b00;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --sp-bg: #0f0f1a;
                --sp-text: #e0e0e0;
                --sp-header: #1a1a2e;
                --sp-border: rgba(255, 255, 255, 0.08);
                --sp-card: rgba(255, 255, 255, 0.04);
                --sp-sub: #666;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--sp-bg);
            color: var(--sp-text);
            min-height: 100vh;
        }

        .header {
            background: var(--sp-header);
            padding: 16px 20px;
            border-bottom: 1px solid var(--sp-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
        }

        .version {
            font-size: 10px;
            color: var(--sp-sub);
            background: var(--sp-card);
            border-radius: 8px;
            padding: 2px 7px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 12px 16px;
        }

        .stat-card {
            background: var(--sp-card);
            border: 1px solid var(--sp-border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 800;
            color: var(--sp-accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--sp-sub);
            margin-top: 2px;
            text-transform: uppercase;
        }

        .section {
            padding: 12px 16px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--sp-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .placeholder {
            text-align: center;
            padding: 30px 20px;
            color: var(--sp-sub);
            font-size: 12px;
        }

        .placeholder-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        .exchange-rate {
            text-align: center;
            font-size: 11px;
            color: var(--sp-sub);
            padding: 8px;
            border-top: 1px solid var(--sp-border);
        }

        .exchange-rate span {
            color: var(--sp-accent);
            font-weight: 700;
        }

        .divider {
            height: 1px;
            background: var(--sp-border);
            margin: 4px 16px;
        }

        .info {
            font-size: 11px;
            color: var(--sp-sub);
            padding: 12px 16px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🛒 Temu Pro</h1>
        <span class="version">v14.0</span>
    </div>
    <div class="stats">
        <div class="stat-card">
            <div class="stat-num" id="stat-processed">—</div>
            <div class="stat-label">Оброблено</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-avg-score">—</div>
            <div class="stat-label">Сер. бал</div>
        </div>
    </div>
    <div class="divider"></div>
    <div class="section">
        <div class="section-title">📊 Аналітика</div>
        <div id="product-info">
            <div class="placeholder">
                <span class="placeholder-icon">🔍</span>
                Наведіть курсор на товар,<br>щоб побачити його оцінку
            </div>
        </div>
    </div>
    <div class="divider"></div>
    <div class="info">
        💡 <b>Налаштування</b> доступні через плаваючу панель на сторінці Temu (вкладка ⚙️ Налаштування).
    </div>
    <div class="exchange-rate">
        Курс: <span id="exchange-rate">завантаження...</span>
    </div>
    <script src="sidepanel.js"></script>
</body>

</html>
